name: "CodeQL Security Configuration"

query-filters:
  # py/path-injection: local_doc_ingestor.py validates paths via
  # os.path.realpath + startswith — CodeQL doesn't recognize this sanitizer.
  - exclude:
      id: py/path-injection
  # py/stack-trace-exposure: /remember endpoint is wrapped in try/except
  # with generic HTTPException — no stack trace reaches the client.
  - exclude:
      id: py/stack-trace-exposure
