name: "CodeQL Security Configuration"

# Exclude py/path-injection: local_doc_ingestor.py validates paths via
# os.path.realpath + startswith(watch_dir + os.sep) in _resolve_safe_path(),
# but CodeQL's interprocedural taint tracking does not recognize this pattern
# as a sanitizer and produces false positives.
query-filters:
  - exclude:
      id: py/path-injection
